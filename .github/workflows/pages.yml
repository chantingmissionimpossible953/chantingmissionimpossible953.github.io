name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A0DAA1: ${{ secrets.A0DAA1 }}
          B1FE09: ${{ secrets.B1FE09 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A0DAA1', '')
          bm = os.environ.get('B1FE09', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 5c04964fb0949479aad6517d2c4b45dc -->', gm)
              s2 = s2.replace('<!-- 9d932e88b9546b2a52835559068ff5ec871ee8400e9eaa -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
